server:
  port: ${PORT:8080}
  servlet:
    context-path: ${CONTEXT_PATH:/basicAuth}

spring:
  #main.allow-bean-definition-overriding: true
  application:
    name: AuthTestProject
  profiles.active: ${AUTH_PROFILE:basicAuth}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/finmatica}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/realms/finmatica/protocol/openid-connect/certs}

springdoc:
  api-docs:
    fileName: ${OPEN_API_FILE_NAME:openapi-${spring.profiles.active}}
    enabled: true
    path: /v3/api-docs/${springdoc.api-docs.fileName}
  swagger-ui:
    enabled: true
    with-credentials: false
    tags-sorter: alpha
    operations-sorter: alpha
    urls:
      - name: "Specifica OpenAPI (YAML)"
        url: "${springdoc.api-docs.path}.yaml"
      - name: "Specifica OpenAPI (JSON)"
        url: "${springdoc.api-docs.path}.json"
    urls-primary-name: "Specifica OpenAPI (YAML)"
    oauth:
      client-id: ${CLIENT_ID:authtestproject-api}
      token-url: ${TOKEN_URL:http://localhost:8081}

app:
  public-apis: ${PUBLIC_APIS:/api/v1/auth/info,/public/**,/actuator/health,/actuator/info,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/error}
  cors:
    # Se non specificato, permette tutto (ottimo per DEV)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
    # Metodi standard permessi di default
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
    # Headers permessi di default
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  basic-security:
    username: admin
    password: password
    roles: ADMIN
  keycloak-admin:
    server-url: ${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8081}
    realm: ${KEYCLOAK_ADMIN_REALM:finmatica}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:finmatica-admin}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:finmatica-admin-secret-change-in-production}
  wso2:
    use-default-rest-template: ${USE_DEFAULT_REST_TEMPLATE:false}
    user-info: ${WSO2_USER_INFO_URI:https://localhost:9443/oauth2/userinfo}

