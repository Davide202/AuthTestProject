[server]
hostname = "localhost"
node_ip = "127.0.0.1"

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

# --- SICUREZZA E USER MANAGEMENT ---
[tenant_manager]
type = "database"

[user_store]
type = "database_unique_id"

[apim.internal_apis]
enable_basic_auth = true

[[apim.internal_apis.allowed_scopes]]
name = "apim:admin"
roles = ["admin"]

# --- CONFIGURAZIONE KEYSTORE (Fondamentale per SSL/TLS) ---
[keystore.tls]
file_name = "wso2carbon.jks"
type = "JKS"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"

[keystore.primary]
file_name = "wso2carbon.jks"
type = "JKS"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"

[truststore]
file_name = "client-truststore.jks"
type = "JKS"
password = "wso2carbon"

# --- DATABASE H2 (Persistenti su File) ---
[database.shared_db]
type = "h2"
url = "jdbc:h2:file:/home/wso2carbon/wso2am-4.3.0/repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"

[database.apim_db]
type = "h2"
url = "jdbc:h2:file:/home/wso2carbon/wso2am-4.3.0/repository/database/WSO2AM_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"