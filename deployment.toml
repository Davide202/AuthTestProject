[server]
hostname = "localhost"
# Rimuovi node_ip = "127.0.0.1" per permettere a WSO2 di usare l'IP del container Docker

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

# --- DEFINIZIONE DEL GATEWAY (Questo fa apparire la spunta nel Publisher) ---
[[apim.gateway.environment]]
name = "Default"
type = "hybrid"
display_name = "Default"
description = "Default Gateway Environment"
show_as_token_endpoint_url = true
service_url = "https://localhost:9443/services/"
ws_endpoint = "ws://localhost:9099"
wss_endpoint = "wss://localhost:8099"
http_endpoint = "http://localhost:8280"
https_endpoint = "https://localhost:8243"

# --- SICUREZZA E USER MANAGEMENT ---
[tenant_manager]
type = "database"

[user_store]
type = "database_unique_id"

[apim.internal_apis]
enable_basic_auth = true

[[apim.internal_apis.allowed_scopes]]
name = "apim:admin"
roles = ["admin"]

# --- CONFIGURAZIONE KEYSTORE ---
[keystore.tls]
file_name = "wso2carbon.jks"
type = "JKS"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"

[keystore.primary]
file_name = "wso2carbon.jks"
type = "JKS"
password = "wso2carbon"
alias = "wso2carbon"
key_password = "wso2carbon"

[truststore]
file_name = "client-truststore.jks"
type = "JKS"
password = "wso2carbon"

# --- DATABASE H2 ---
[database.shared_db]
type = "h2"
url = "jdbc:h2:file:/home/wso2carbon/wso2am-4.3.0/repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"

[database.apim_db]
type = "h2"
url = "jdbc:h2:file:/home/wso2carbon/wso2am-4.3.0/repository/database/WSO2AM_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"

[apim.cors]
enable = true
allow_origins = ["*"]
allow_methods = ["GET","PUT","POST","DELETE","PATCH","OPTIONS"]
allow_headers = ["authorization","Access-Control-Allow-Origin","Content-Type","SOAPAction","apikey","Internal-Key"]
allow_credentials = false

[apim.jwt]
enable = true
header = "X-JWT-Assertion"
signing_algorithm = "SHA256withRSA"
enable_user_claims = true
claims_extractor_impl = "org.wso2.carbon.apimgt.impl.token.DefaultClaimsRetriever"