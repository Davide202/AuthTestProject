# Runs:
# - PostgreSQL for Keycloak (keycloak-db)
# - Keycloak (IAM) with realm import and demo users
# - AuthTestProject backend service (Spring Boot)
#
# Keycloak admin console: http://localhost:8081/admin
# Keycloak realm: finmatica
# Demo users:
# - admin / Admin123! (realm role: ADMIN)
# - user1 / User123! (realm role: USER)
#
# pgAdmin: http://localhost:5050
# Login: admin@test.com / admin
#
# IMPORTANT: Credentials below are for local/dev only.

# DOCKER COMPOSE COMMANDS
# docker-compose --profile basic up -d
# docker-compose --profile keycloak up -d
# docker-compose --profile wso2 up -d
services:

  api-manager:
    image: wso2/wso2am:4.3.0
    container_name: wso2-am
    profiles:
      - "keycloak"
      - "basic"
      - "wso2"
    ports:
      - "9443:9443"
      - "8280:8280"
      - "8243:8243"
    volumes:
      - wso2_db:/home/wso2carbon/wso2am-4.3.0/repository/database
      - wso2_server:/home/wso2carbon/wso2am-4.3.0/repository/deployment/server
      - ./deployment.toml:/home/wso2carbon/wso2am-4.3.0/repository/conf/deployment.toml:ro
    environment:
      - JVM_MEM_OPTS=-Xms1024m -Xmx2048m
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9443/carbon/admin/login.jsp"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    profiles:
      - "keycloak"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.8
    container_name: keycloak
    profiles:
      - "keycloak"
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: kcadmin
      KC_BOOTSTRAP_ADMIN_PASSWORD: kcadmin
    command:
      - start-dev
      - --http-port=8081
      - --import-realm
      - --hostname-strict=false
    ports:
      - "8081:8081"
    volumes:
      - ./realm-finmatica.json:/opt/keycloak/data/import/realm-finmatica.json:ro
    networks:
      - app-net
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8081" ]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: pgadmin
    profiles:
      - "keycloak"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-net

  basic-backend:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    container_name: basic-backend
    profiles:
      - "basic"
    depends_on:
      api-manager:
        condition: service_healthy
    environment:
      PORT: 8082
      CONTEXT_PATH: /basicAuth
      AUTH_PROFILE: basicAuth
      JAVA_OPTS: -Xms256m -Xmx512m --enable-preview
      APP_SECURITY_BASIC_USERNAME: myCustomAdmin
      APP_SECURITY_BASIC_PASSWORD: MySuperSecretPassword!
      APP_SECURITY_BASIC_ROLES: ADMIN,USER,WSO2_MANAGER
    ports:
      - "8082:8082"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/basicAuth/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak-backend:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    container_name: keycloak-backend
    profiles:
      - "keycloak"
    depends_on:
      keycloak:
        condition: service_healthy
      api-manager:
        condition: service_healthy
    environment:
      PORT: 8083
      CONTEXT_PATH: /keycloak
      AUTH_PROFILE: keycloak
      JWT_ISSUER_URI: http://localhost:8081/realms/finmatica
      JWT_JWK_SET_URI: http://keycloak:8081/realms/finmatica/protocol/openid-connect/certs
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8081
      KEYCLOAK_ADMIN_REALM: finmatica
      KEYCLOAK_ADMIN_CLIENT_ID: finmatica-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: finmatica-admin-secret-change-in-production
      CLIENT_ID: postman
      TOKEN_URL: http://localhost:8081
      JAVA_OPTS: -Xms256m -Xmx512m --enable-preview
    ports:
      - "8083:8083"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/keycloak/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  wso2-backend:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    container_name: wso2-backend
    profiles:
      - "wso2"
    depends_on:
      api-manager:
        condition: service_healthy
    environment:
      PORT: 8084
      CONTEXT_PATH: /wso2
      AUTH_PROFILE: wso2
      JWT_ISSUER_URI: https://api-manager:9443/oauth2/token
      JWT_JWK_SET_URI: https://api-manager:9443/oauth2/jwks
      WSO2_USER_INFO_URI: https://api-manager:9443/oauth2/userinfo
      TOKEN_URL: https://localhost:9443
      JAVA_OPTS: -Xms256m -Xmx512m --enable-preview
    ports:
      - "8084:8084"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/wso2/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  app-net:
    driver: bridge

volumes:
  keycloak_db_data:
  wso2_db:
  wso2_server: