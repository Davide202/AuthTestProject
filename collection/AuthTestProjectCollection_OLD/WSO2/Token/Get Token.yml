info:
  name: Get Token
  type: http
  seq: 1

http:
  method: POST
  url: https://localhost:9443/oauth2/token
  body:
    type: form-urlencoded
    data:
      - name: username
        value: admin
      - name: password
        value: admin
      - name: grant_type
        value: password
      - name: scope
        value: openid  groups roles internal_login
  auth:
    type: basic
    username: "{{wso2_client_id}}"
    password: "{{wso2_client_password}}"

runtime:
