request:
  auth:
    type: oauth2
    flow: client_credentials
    accessTokenUrl: "{{wso2_token_url}}"
    credentials:
      clientId: "{{sub_b_prod_client_id}}"
      clientSecret: "{{sub_b_prod_client_secret}}"
      placement: body
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
