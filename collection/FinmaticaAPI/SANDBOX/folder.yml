info:
  name: SANDBOX
  type: folder
  seq: 1

request:
  auth:
    type: bearer
    token: "{{user_token}}"
  variables:
    - name: user_token
      value: ""
  scripts:
    - type: before-request
      code: |-
        const { loginWithClientCredentials } = require('./axiosutil.js');
        const {isTokenExpired} = require('./util.js');

        //var expired = isTokenExpired(bru.getVar("admin_token"));
        if(isTokenExpired(bru.getVar("admin_token"))){
            var fullUrl = bru.getCollectionVar("wso2_token_url");
            var clientId = bru.getCollectionVar("sub_b_sand_client_id");
            var clientSecret = bru.getCollectionVar("sub_b_sand_client_secret");
            var response = await loginWithClientCredentials(fullUrl, clientId, clientSecret, "");
            bru.setVar("user_token",response.data.access_token);
        }
