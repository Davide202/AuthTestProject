info:
  name: SANDBOX
  type: folder
  seq: 1

request:
  auth:
    type: oauth2
    flow: client_credentials
    accessTokenUrl: "{{wso2_token_url}}"
    credentials:
      clientId: "{{sub_b_sand_client_id}}"
      clientSecret: "{{sub_b_sand_client_secret}}"
      placement: body
    tokenConfig:
      id: sandboxtoken
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
  variables:
    - name: user_token
      value: ""
