info:
  name: WSO2 KEYCLOAK
  type: folder
  seq: 1

request:
  auth:
    type: oauth2
    flow: client_credentials
    accessTokenUrl: https://localhost:9443/oauth2/token
    credentials:
      clientId: ZKhi34gVqsNHMHdZzZOmz2FHSX0a
      clientSecret: RVATOv0hr_4Mw_8Zs7Ma5QsPuV4a
      placement: basic_auth_header
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
  variables:
    - name: host
      value: https://localhost:8243/keycloak/1.0
    - name: admin_token
      value: ""
    - name: user_token
      value: ""
    - name: admin_id_token
      value: ""
    - name: user_id_token
      value: ""
  scripts:
    - type: before-request
      code: |-
        const axios = require('axios');

        // 1. Funzione Helper per formattare i dati (Sostituisce URLSearchParams)
        const toFormUrlEncoded = (obj) => {
          return Object.keys(obj)
            .map(k => encodeURIComponent(k) + '=' + encodeURIComponent(obj[k]))
            .join('&');
        };

        // 2. Recupera le variabili (Usa nomi esatti della Collezione)
        const realm = bru.getEnvVar("realm");
        const baseUrl = bru.getEnvVar("keycloak_base_url");
        const adminEmail = bru.getEnvVar("admin_email");
        const adminPassword = bru.getEnvVar("admin_password");
        const adminToken = bru.getVar("admin_token");
        const clientId = bru.getEnvVar("client_id");

        const fullUrl = `${baseUrl}/realms/${realm}/protocol/openid-connect/token`.replace(/([^:]\/)\/+/g, "$1");
        console.log("keycloack_base_url " + fullUrl);

        var adminTokenExpired = true;

        // --- LOGICA DI CONTROLLO SCADENZA ---
        if (adminToken) {
            try {
                const parts = adminToken.split('.');
                if (parts.length === 3) {
                    // Decodifica manuale del payload JWT (atob è solitamente disponibile)
                    const payload = JSON.parse(atob(parts[1]));
                    const now = Math.floor(Date.now() / 1000);
                    
                    if (payload.exp && (payload.exp - now) > 10) {
                        console.log(`✅ Admin Token valido per altri ${payload.exp - now}s. Skip login.`);
                        adminTokenExpired = false;
                    }
                }
            } catch (e) {
                console.warn("Token non leggibile, procedo al login.");
            }
        }


        if(adminTokenExpired){
              console.log(`✅ Retrieving Admin Token`);
            const adminBodyData = {
                client_id: clientId,
                username: adminEmail,
                password: adminPassword,
                grant_type: 'password',
                scope: 'openid profile email'
            };

            try {
                const response = await axios.post(
                    fullUrl,
                    toFormUrlEncoded(adminBodyData), // Usa la nostra funzione helper
                    { headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }
                );

                if (response.data.access_token) {
                    bru.setVar("admin_token", response.data.access_token);
                    console.log("🆕 Nuovo Access Token salvato correttamente.");
                }
                if(response.data.id_token){
                    bru.setVar("admin_id_token", response.data.id_token);
                    const parts = response.data.id_token.split('.');
                    if (parts.length > 1) {
                        let base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
                        const pad = base64.length % 4;
                        if (pad) base64 += '='.repeat(4 - pad);

                        const payload = JSON.parse(atob(base64));

                        if (payload.sub) {
                            bru.setVar("admin_kc_user_id", payload.sub);
                            console.log("🆕 admin_kc_user_id salvato correttamente.");
                        }
                    }
                }
            } catch (error) {
                const errorMsg = error.response ? JSON.stringify(error.response.data) : error.message;
                console.error("❌ Fallimento autenticazione Admin: ", errorMsg);
            }
        }



        const userEmail = bru.getEnvVar("admin_email");
        const userPassword = bru.getEnvVar("admin_password");
        const userToken = bru.getVar("user_token");
        var userTokenExpired = true;

        // --- LOGICA DI CONTROLLO SCADENZA ---
          if (userToken) {
              try {
                  const parts = userToken.split('.');
                  if (parts.length === 3) {
                      // Decodifica manuale del payload JWT (atob è solitamente disponibile)
                      const payload = JSON.parse(atob(parts[1]));
                      const now = Math.floor(Date.now() / 1000);

                      if (payload.exp && (payload.exp - now) > 10) {
                          console.log(`✅ User Token valido per altri ${payload.exp - now}s. Skip login.`);
                          userTokenExpired = false;
                      }
                  }
              } catch (e) {
                  console.warn("Token non leggibile, procedo al login.");
              }
          }

          // --- LOGICA DI AUTENTICAZIONE ---
          if (userTokenExpired) {
              console.log(`✅ Retrieving User Token`);
              const userBodyData = {
                      client_id: clientId,
                      username: userEmail,
                      password: userPassword,
                      grant_type: 'password',
                      scope: 'openid profile email'
                  };

                  try {
                      const response = await axios.post(
                          fullUrl,
                          toFormUrlEncoded(userBodyData), // Usa la nostra funzione helper
                          { headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }
                      );

                      if (response.data.access_token) {
                          bru.setVar("user_token", response.data.access_token);
                          console.log("🆕 Nuovo Access Token salvato correttamente.");
                      }
                      if(response.data.id_token){
                            bru.setVar("user_id_token", response.data.id_token);
                            const parts = response.data.id_token.split('.');
                            if (parts.length > 1) {
                                let base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
                                const pad = base64.length % 4;
                                if (pad) base64 += '='.repeat(4 - pad);

                                const payload = JSON.parse(atob(base64));

                                if (payload.sub) {
                                    bru.setVar("user_kc_user_id", payload.sub);
                                    console.log("🆕 admin_kc_user_id salvato correttamente.");
                                }
                            }
                        }
                  } catch (error) {
                      const errorMsg = error.response ? JSON.stringify(error.response.data) : error.message;
                      console.error("❌ Fallimento autenticazione User: ", errorMsg);
                  }
          }
