info:
  name: KEYCLOAK
  type: folder
  seq: 1

request:
  auth:
    type: bearer
    token: "{{admin_token}}"
  variables:
    - name: host
      value: http://localhost:8083/keycloak
    - name: admin_token
      value: ""
    - name: user_token
      value: ""
    - name: admin_id_token
      value: ""
    - name: user_id_token
      value: ""
  scripts:
    - type: before-request
      code: |-
        const { login } = require('./keycloakutil.js');

        login();
