info:
  name: Get Admin Token
  type: http
  seq: 3

http:
  method: POST
  url: https://localhost:9443/oauth2/token
  body:
    type: form-urlencoded
    data:
      - name: username
        value: "{{wso2_admin_username}}"
      - name: password
        value: "{{wso2_admin_password}}"
      - name: grant_type
        value: password
      - name: scope
        value: openid profile email roles
  auth:
    type: basic
    username: ZKhi34gVqsNHMHdZzZOmz2FHSX0a
    password: RVATOv0hr_4Mw_8Zs7Ma5QsPuV4a

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        // 1. Save Access Token
        if (body.access_token) {
            bru.setVar("admin_token", body.access_token);
        }

        // 2. Save ID Token
        if (body.id_token) {
            bru.setVar("admin_id_token", body.id_token);
            
            try {
                const parts = body.id_token.split('.');
                if (parts.length > 1) {
                    let base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
                    const pad = base64.length % 4;
                    if (pad) base64 += '='.repeat(4 - pad);
                    
                    const payload = JSON.parse(atob(base64));
                    
                    if (payload.sub) {
                        bru.setVar("admin_kc_user_id", payload.sub);
                        // Also set user_uuid if needed for other endpoints
                        // bru.setVar("user_uuid", payload.sub); 
                    }
                }
            } catch (e) {
                console.error("Error parsing JWT:", e);
            }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
