info:
  name: config
  type: http
  seq: 2

http:
  method: GET
  url: https://localhost:9443/oauth2/oidcdiscovery/.well-known/openid-configuration
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        console.log('Request ' );
        console.log(req);
    - type: after-response
      code: |-
        const { printAccessToken } = require('./util.js');

        const body = res.getBody();


        console.log('Response');

        // 1. Save Access Token
        if (body.access_token) {
            bru.setVar("admin_token", body.access_token);
            printAccessToken('Access Token',body.access_token);
        }

        // 2. Save ID Token
        if (body.id_token) {
            bru.setVar("admin_id_token", body.id_token);
            printAccessToken('Id Token',body.id_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
