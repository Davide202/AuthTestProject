info:
  name: WSO2
  type: folder
  seq: 1

request:
  auth:
    type: bearer
    token: "{{wso2_jwt}}"
  variables:
    - name: host
      value: http://localhost:8084/wso2
    - name: admin_token
      value: ""
    - name: user_token
      value: ""
    - name: admin_id_token
      value: ""
    - name: user_id_token
      value: ""
  scripts:
    - type: before-request
      code: |-
        const { basicAuth } = require('./wso2util.js');

        bru.setEnvVar("wso2_jwt", "xxx");
        const newTokens = await basicAuth(bru);
        bru.setEnvVar("wso2_jwt", newTokens.accessToken);

        //console.log("💾 Token scritti con successo nell'ambiente di Bruno!");
